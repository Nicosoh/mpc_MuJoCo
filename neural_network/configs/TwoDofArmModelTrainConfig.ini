[LOSS]
; weight for stationary-point penalty
alpha = 0.1
; stationary point for twodofarm (angle=0, angular_velocity=0)
; x_s = [0.0, 0.0, 0.0, 0.0]
; y_s = [0.0]

[VAL]
val_interval = 1