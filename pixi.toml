[project]
name = "acados-pixi"
channels = ["conda-forge"]
platforms = ["osx-64"]

[dependencies]
# Core build tools
python = "3.11.*"
cmake = "*"
ninja = "*"
pkg-config = "*"
git = "*"
c-compiler = "*"
cxx-compiler = "*"

# Python deps for acados_template + examples
pip = "*"
setuptools = "*"
wheel = "*"
casadi = "*"
numpy = "*"
scipy = "*"
matplotlib = "*"
pinocchio = ">=3.7.0,<4"
meshcat-python = ">=0.3.2,<0.4"
mujoco = ">=3.3.2,<4"
mediapy = ">=1.2.4,<2"
example-robot-data = ">=4.3.0,<5"
robot_descriptions = ">=1.21.0,<2"
pink = ">=3.4.0,<4"
plotly = ">=6.4.0,<7"
mplcursors = ">=0.7,<0.8"
seaborn = ">=0.13.2,<0.14"

[pypi-dependencies]
tqdm = "*"
torch = ">=2.2.2, <3"

[activation.env]
# Path to acados source (needed by acados_template)
ACADOS_SOURCE_DIR = "$PWD/external/acados"

# Shared libraries (Linux uses LD_LIBRARY_PATH, macOS uses DYLD_LIBRARY_PATH)
LD_LIBRARY_PATH   = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
DYLD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH"

# Add the Tera renderer (if downloaded) to PATH
PATH = "$PWD/external/acados/bin:$PATH"

# Include + link flags so generated code can find HPIPM/BLASFEO headers & libs
CFLAGS   = "-I$CONDA_PREFIX/include -I$CONDA_PREFIX/include/hpipm/include -I$CONDA_PREFIX/include/blasfeo/include $CFLAGS"
CPPFLAGS = "$CFLAGS"
LDFLAGS  = "-L$CONDA_PREFIX/lib $LDFLAGS"

# Makes CMake-based downstream projects find acados automatically
CMAKE_PREFIX_PATH = "$CONDA_PREFIX:$CMAKE_PREFIX_PATH"

# (Optional) useful for pkg-config consumers
PKG_CONFIG_PATH = "$CONDA_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"

[tasks]
# Clone acados with submodules
acados_clone = "git clone --recursive https://github.com/acados/acados.git external/acados"

# Configure acados to install into the pixi prefix
acados_configure = "cmake -S external/acados -B build/acados -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX -DBLASFEO_TARGET=X64_AUTOMATIC -DHPIPM_TARGET=GENERIC -DACADOS_EXAMPLES=OFF -DACADOS_UNIT_TESTS=OFF"

# Build and install the C libs (acados, hpipm, blasfeo) into the env
acados_build   = "cmake --build build/acados -j $PIXI_JOBS"
acados_install = "cmake --install build/acados --prefix $CONDA_PREFIX"

# Install the Python interface (editable)
acados_python = "python -m pip install -e external/acados/interfaces/acados_template"

# Other installations
# pip install tqdm

# One-shot: clone + configure + build + install + python interface
acados_full = "pixi run acados_clone && pixi run acados_configure && pixi run acados_build && pixi run acados_install && pixi run acados_python"

# Run the minimal Python example
minimal_example = "export DYLD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH\" && python external/acados/examples/acados_python/getting_started/minimal_example_ocp.py"

# For cartpole
main_cartpole = "export DYLD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH\" && python main.py cartpole"
viz_cartpole = "python pin_visualizer.py cartpole"

# For pendulum
main_pendulum = "export DYLD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH\" && python main.py pendulum"
viz_pendulum = "python pin_visualizer.py pendulum"

# For double_pendulum
main_double_pendulum = "export DYLD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH\" && python main.py double_pendulum"
viz_double_pendulum = "python pin_visualizer.py double_pendulum"

# For cartpole_double_pendulum
main_cartpole_double_pendulum = "export DYLD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH\" && python main.py cartpole_double_pendulum"
viz_cartpole_double_pendulum = "python pin_visualizer.py cartpole_double_pendulum"

# For iiwa14
main_iiwa14 = "export DYLD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH\" && python main.py iiwa14"
viz_iiwa14 = "python pin_visualizer.py iiwa14"

# For all models
data_collector = "export DYLD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH\" && python -m data_collection.data_collector"
data_viz = "python -m data_collection.data_viz"
