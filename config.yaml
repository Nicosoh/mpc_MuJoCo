# ----------------------------------------------------------------------------------------
# CARTPOLE MODEL CONFIGURATION
# ----------------------------------------------------------------------------------------
cartpole:
  mujoco:
    urdf_available: false
    model_path: "models_xml/cartpole.xml"
    sim_timestep: 0.001 # seconds
    sim_duration: 5 # seconds
    sim_framerate: 30  # Hz
    render: true # Render simulation
    verbose: false # Print debug information
    resolution: [480, 640]

  model:
    name: "cartpole"
    mass:
      cart: 1.0 # kg
      pendulum_stick: 0.0001 # kg
      pendulum: 0.1 # kg
    inertia:
      cart: [0.00001, 0.00001, 0.00001] # kg*m^2
      pendulum_stick: [0.00001, 0.00001, 0.00001] # kg*m^2
      pendulum: [0.00001, 0.00001, 0.00001] # kg*m^2

  pin:
    nu: 1 # Number of control inputs
    actuated_joints: [0] # First joint

  mpc:
    Fmax: [80] # Maximum force
    N_horizon: 300 # Prediction horizon
    use_RTI: true # Use Real-Time Iteration
    mpc_timestep: 0.01 # seconds
    x0: [0.0, 3.14159265, 0.0, 0.0]
    x0_random: true # If true, x0 above will not be used
    x0_range: [[-1.0, 1.0], [-3.142, 3.142], [-0.5, 0.5], [-0.5, 0.5]] # Range for random x0
    x0_sampling: "uniform" # Only uniform for now
    Q_mat: [2000, 10000, 0.02, 0.02] # State cost weights
    R_mat: [0.02] # Input cost weights
    early_termination: true # Enable early termination based on cost
    termination_cost: 0.1 # Tolerance for early termination cost
    solve_ocp: true # Enable if only a single step is required
    full_traj: true # If above is true, then this needs to be true as well
    
  plots:
    Cart Position: ["qpos", 0, "m"]
    Pendulum Angle: ["qpos", 1, "rad"]
    Cart Velocity: ["qvel", 0, "m/s"]
    Pendulum Angular Velocity: ["qvel", 1, "rad/s"]
    MPC Cost: ["cost", 0, "Cost"]
    Control Input: ["ctrl", 0, "N"]

# ----------------------------------------------------------------------------------------
# PENDULUM MODEL CONFIGURATION
# ----------------------------------------------------------------------------------------
pendulum:
  mujoco:
    urdf_available: false
    model_path: "models_xml/pendulum.xml"
    sim_timestep: 0.001 # seconds
    sim_duration: 5.0 # seconds
    sim_framerate: 30  # Hz
    render: true # Render simulation
    verbose: false # Print debug information
    resolution: [480, 640]

  model:
    name: "pendulum"
    mass:
      pendulum: 0.1 # kg
    inertia:
      pendulum: [0.00001, 0.00001, 0.00001] # kg*m^2

  pin:
    nu: 1 # Number of control inputs
    actuated_joints: [0] # First and only joint

  mpc:
    Fmax: [50] # Maximum force
    N_horizon: 300 # Prediction horizon
    use_RTI: true # Use Real-Time Iteration
    mpc_timestep: 0.01 # seconds
    x0: [3.142, 0.0]
    x0_random: true # If true, x0 above will not be used
    x0_range: [[-3.142, 3.142], [-0.5, 0.5]] # Range for random x0
    x0_sampling: "uniform" # Only uniform for now
    Q_mat: [2000, 0.02] # State cost weights
    R_mat: [20] # Input cost weights
    early_termination: true # Enable early termination based on cost
    termination_cost: 0.01 # Tolerance for early termination cost
    solve_ocp: false # Enable if only a single step is required
    full_traj: true # If above is true, then this needs to be true as well

  plots:
    Pendulum Angle: ["qpos", 0, "rad"]
    Pendulum Angular Velocity: ["qvel", 0, "rad/s"]
    MPC Cost: ["cost", 0, "Cost"]
    Control Input: ["ctrl", 0, "Nm"]

